# CodeRabbit configuration
# Docs: https://docs.coderabbit.ai/getting-started/configure-coderabbit
#
# Goal: high-signal reviews on code that matters (Convex backend + MCP server),
# light-touch on content pages, skip docs entirely. The path_instructions encode
# pitfalls already discovered in this repo so CodeRabbit catches the next
# instance instead of waiting for a runtime bug.

language: en-US
early_access: false
tone_instructions: >
  Be direct. Skip praise and filler. Reference file:line for every issue.
  Distinguish "must fix before merge" from "nice to have". When in doubt about
  intent, ask one clarifying question instead of speculating.

reviews:
  profile: assertive
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: true

  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
    base_branches:
      - main

  # Skip noise. Two narrowing rules apply here, both because of repo specifics:
  #
  # 1. Do NOT blanket-exclude "*.md". The mcp-server/nodes/**/*.md files are
  #    the agent's knowledge base — runtime data with a strict frontmatter
  #    schema, not prose docs. Excluding them would hide schema drift,
  #    duplicate IDs, dead citations, and prompt-injection content from review.
  #    Instead we list the actual prose-doc files explicitly.
  #
  # 2. Do NOT blanket-exclude "convex/_generated/**". The auto-generated TS
  #    files (.js, .d.ts) should skip review, but `convex/_generated/ai/` holds
  #    the Convex AI guidelines — referenced by our convex/** path_instructions
  #    and worth visibility when it changes.
  path_filters:
    # Prose docs (explicit, not glob-wide)
    - "!README.md"
    - "!**/CHANGELOG*"
    - "!AGENTS.md"
    - "!CLAUDE.md"
    - "!PLAN.md"
    - "!docs/**/*.md"
    - "!.claude/**/*.md"
    # Lockfiles
    - "!**/package-lock.json"
    - "!**/bun.lock"
    - "!**/bun.lockb"
    # Generated Convex TS — keep convex/_generated/ai/ visible
    - "!convex/_generated/*.js"
    - "!convex/_generated/*.d.ts"
    # Build output and local-only artifacts
    - "!.context/**"
    - "!public/**"
    - "!dist/**"
    - "!.astro/**"

  path_instructions:
    - path: "convex/**"
      instructions: |
        Convex backend. Read convex/_generated/ai/guidelines.md mentally before
        reviewing. Block-level concerns to flag aggressively:

        - Public action()/mutation()/query() that touch admin-only data, fanouts,
          or anything that mutates other users' state. Admin-only logic must use
          internalAction/internalMutation/internalQuery — public functions are
          callable from any browser via PUBLIC_CONVEX_URL.
        - Denormalized counter rows alongside source-of-truth tables (e.g.
          likeCounts beside likes). Two concurrent first-writes both see no
          counter and both insert — duplicates persist and .unique() throws
          forever. Prefer deriving counts on the fly via index + .collect().length
          unless there is a documented hot-path reason.
        - .unique() called on data that is not actually unique in practice.
        - Missing indexes on access patterns used in queries (every withIndex
          should match a defineTable index).
        - Soft-delete (tombstone) inconsistencies — if one query filters
          deleted=true and another forgets, list views diverge.
        - Node-only code (Nodemailer, etc.) outside files marked 'use node'.

    - path: "mcp-server/nodes/**/*.md"
      instructions: |
        Knowledge-base nodes — runtime data, NOT prose docs. The router
        (Haiku) reads summaries to pick relevant IDs; the responder (Sonnet)
        composes cited answers from full bodies. Strict checks:

        - YAML frontmatter must include all required fields: id (unique
          across all nodes), title, source, url, tags (array), summary
          (1-3 sentences). Missing or extra fields break the loader.
        - id must be unique across the entire nodes/ tree. ingest.ts doctor
          catches duplicates at build time; flagging in review prevents the
          PR from breaking the build.
        - url must point to a real, reachable URL on a Rehman-controlled
          surface (arjunagiarehman.com, github.com/arjunagi-a-rehman, etc.).
          Citations link readers there post-answer.
        - source should describe the origin (e.g. "essay", "project page",
          "about-rehman"). Used downstream for citation formatting.
        - Body content is trusted (the repo owner authored it), but flag any
          content that looks like prompt-injection (e.g. "ignore previous
          instructions", "you are now...", role-confusion patterns) — even
          unintentional patterns can degrade router/responder behavior.
        - Watch for content that contradicts other nodes (two nodes giving
          conflicting facts about the same project) — the responder will
          cite both and the answer will be incoherent.

    - path: "mcp-server/**"
      instructions: |
        Public reference implementation. Forkers will copy this code into their
        own personal-brand agents. Be strict on:

        - Anthropic SDK calls without error handling — silent failures in the
          router or responder will produce empty SSE streams that look like
          frontend bugs.
        - ANTHROPIC_API_KEY leakage paths — never logged, never returned in
          response bodies, never echoed in error messages.
        - Prompt injection vectors. Knowledge-node markdown is trusted (the
          repo owner authored it), but user query strings flowing into
          router.ts or responder.ts must not be interpolated into system
          prompts in ways that let a query rewrite the instruction.
        - Citation integrity — if responder.ts strips phantom citations
          post-hoc, regressions to that filter undermine the whole "every
          answer is cited" claim.
        - Zod schema bypass. Router output must stay schema-validated;
          hallucinated node IDs must stay filtered against the known-valid set.
        - SSE event shape changes — /ask emits {token, done, error} events
          consumed by AgentChat.tsx. Schema drift breaks the browser UI silently.
        - MCP tool surface (ask_rehman, list_nodes) — renaming or changing
          their input schemas is a breaking change for any external agent that
          connected via Streamable HTTP.

    - path: "src/components/react/**"
      instructions: |
        React islands hydrated by Astro via client:* directives. Concerns:

        - Hydration boundary leaks — server-only data (process.env, fs) used in
          a component that renders on the client.
        - Loading-state defaults that look like real values (e.g. likeCount
          defaulting to 0 on mount, then snapping to the real number, producing
          a flash). Use a skeleton or em-dash, not a semantically valid zero.
        - Browser-only IDs (localStorage clientId via useEffect) gating Convex
          useQuery calls. The 2-render delay can cause UI flicker — split into
          public + per-client queries when possible.
        - AgentChat variant API — variant: 'page' | 'hero' | 'inline', chips,
          leadInLabel, surface — surface is REQUIRED (analytics depends on it,
          there is no fallback). Flag any new caller that omits surface.
        - Bundle bloat. AgentChat sits on the home hero (client:idle); keep an
          eye on imports that pull in large transitive deps.

    - path: "src/components/*.astro"
      instructions: |
        Astro components. transition:persist on the component tag does NOT
        propagate to the root HTML element — apply it directly to the root tag
        inside the component definition, or it silently disappears in the build.

    - path: "src/pages/**"
      instructions: |
        Mostly content. Light review only — accessibility issues (missing alt,
        bad heading order), broken internal links, hydration mismatches, or
        missing surface= prop on AgentChat embeds. Skip stylistic nits on prose.

    - path: "**/*.test.ts"
      instructions: |
        Tests use vitest. Flag: tests that mock the system under test
        (testing the mock), shared mutable state across tests, .only/.skip
        left in place, and tests that pass without actually asserting anything.

    - path: "**/*.test.tsx"
      instructions: |
        React tests use @testing-library/react. Prefer findBy*/getByRole over
        getByTestId. Flag tests that assert on implementation details
        (className, internal state) instead of user-observable behavior.

    - path: ".claude/**"
      instructions: |
        Claude Code agent configuration (hooks, worktrees, skill state). Flag
        only outright errors — these files are workflow infrastructure, not
        product code, and frequently change.

  tools:
    languagetool:
      enabled: false
    markdownlint:
      enabled: false
    biome:
      enabled: true
    eslint:
      enabled: false
    actionlint:
      enabled: true
    yamllint:
      enabled: true
    gitleaks:
      enabled: true

chat:
  auto_reply: true
