<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#040912"/>
      <stop offset="60%" stop-color="#060d1a"/>
      <stop offset="100%" stop-color="#030810"/>
    </linearGradient>

    <!-- Cyan glow radial -->
    <radialGradient id="glowCyan" cx="72%" cy="45%" r="38%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Blue glow radial -->
    <radialGradient id="glowBlue" cx="15%" cy="75%" r="35%">
      <stop offset="0%" stop-color="#1565ff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#1565ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Logo diamond gradient -->
    <linearGradient id="diamondFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#060d1a"/>
    </linearGradient>

    <!-- Text gradient cyan→blue -->
    <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#e8f4ff"/>
      <stop offset="100%" stop-color="#7eb3ff"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="cyanGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="logoGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="cardClip">
      <rect x="0" y="0" width="1200" height="630" rx="0"/>
    </clipPath>
  </defs>

  <g clip-path="url(#cardClip)">

    <!-- Base background -->
    <rect width="1200" height="630" fill="url(#bgGrad)"/>

    <!-- Glow overlays -->
    <rect width="1200" height="630" fill="url(#glowCyan)"/>
    <rect width="1200" height="630" fill="url(#glowBlue)"/>

    <!-- ── Circuit board trace grid ── -->
    <!-- Horizontal traces -->
    <line x1="0" y1="80"  x2="480" y2="80"  stroke="#00e5ff" stroke-width="0.6" opacity="0.08"/>
    <line x1="0" y1="160" x2="380" y2="160" stroke="#00e5ff" stroke-width="0.6" opacity="0.06"/>
    <line x1="0" y1="240" x2="300" y2="240" stroke="#00e5ff" stroke-width="0.6" opacity="0.07"/>
    <line x1="0" y1="320" x2="260" y2="320" stroke="#00e5ff" stroke-width="0.6" opacity="0.05"/>
    <line x1="0" y1="400" x2="350" y2="400" stroke="#00e5ff" stroke-width="0.6" opacity="0.06"/>
    <line x1="0" y1="480" x2="420" y2="480" stroke="#00e5ff" stroke-width="0.6" opacity="0.07"/>
    <line x1="0" y1="560" x2="500" y2="560" stroke="#00e5ff" stroke-width="0.6" opacity="0.05"/>

    <!-- Right-side traces -->
    <line x1="720" y1="60"  x2="1200" y2="60"  stroke="#00e5ff" stroke-width="0.6" opacity="0.06"/>
    <line x1="820" y1="140" x2="1200" y2="140" stroke="#00e5ff" stroke-width="0.6" opacity="0.05"/>
    <line x1="760" y1="220" x2="1200" y2="220" stroke="#1565ff" stroke-width="0.6" opacity="0.06"/>
    <line x1="840" y1="310" x2="1200" y2="310" stroke="#1565ff" stroke-width="0.6" opacity="0.05"/>
    <line x1="780" y1="400" x2="1200" y2="400" stroke="#00e5ff" stroke-width="0.6" opacity="0.06"/>
    <line x1="720" y1="490" x2="1200" y2="490" stroke="#00e5ff" stroke-width="0.6" opacity="0.05"/>
    <line x1="800" y1="570" x2="1200" y2="570" stroke="#1565ff" stroke-width="0.6" opacity="0.06"/>

    <!-- Vertical traces -->
    <line x1="80"  y1="0" x2="80"  y2="320" stroke="#00e5ff" stroke-width="0.6" opacity="0.07"/>
    <line x1="160" y1="0" x2="160" y2="240" stroke="#00e5ff" stroke-width="0.6" opacity="0.05"/>
    <line x1="240" y1="0" x2="240" y2="320" stroke="#1565ff" stroke-width="0.6" opacity="0.06"/>
    <line x1="320" y1="400" x2="320" y2="630" stroke="#00e5ff" stroke-width="0.6" opacity="0.06"/>
    <line x1="400" y1="480" x2="400" y2="630" stroke="#1565ff" stroke-width="0.6" opacity="0.05"/>
    <line x1="480" y1="0" x2="480" y2="180" stroke="#00e5ff" stroke-width="0.6" opacity="0.05"/>

    <!-- L-shaped traces -->
    <polyline points="0,120 200,120 200,200 350,200" fill="none" stroke="#00e5ff" stroke-width="0.7" opacity="0.09"/>
    <polyline points="0,360 150,360 150,440 280,440" fill="none" stroke="#1565ff" stroke-width="0.7" opacity="0.08"/>
    <polyline points="900,0 900,100 1000,100 1000,180" fill="none" stroke="#00e5ff" stroke-width="0.7" opacity="0.08"/>
    <polyline points="1050,0 1050,140 1150,140 1150,220" fill="none" stroke="#1565ff" stroke-width="0.7" opacity="0.07"/>
    <polyline points="820,350 820,430 950,430 950,500" fill="none" stroke="#00e5ff" stroke-width="0.7" opacity="0.08"/>
    <polyline points="1100,350 1100,450 1200,450" fill="none" stroke="#1565ff" stroke-width="0.7" opacity="0.07"/>

    <!-- PCB junction nodes (circles at trace intersections) -->
    <circle cx="80"  cy="80"  r="2.5" fill="#00e5ff" opacity="0.25"/>
    <circle cx="160" cy="160" r="2"   fill="#00e5ff" opacity="0.2"/>
    <circle cx="240" cy="240" r="2.5" fill="#1565ff" opacity="0.25"/>
    <circle cx="200" cy="200" r="3"   fill="#00e5ff" opacity="0.3"/>
    <circle cx="320" cy="400" r="2"   fill="#00e5ff" opacity="0.2"/>
    <circle cx="400" cy="480" r="2.5" fill="#1565ff" opacity="0.22"/>
    <circle cx="900" cy="100" r="3"   fill="#00e5ff" opacity="0.28"/>
    <circle cx="1000" cy="180" r="2"  fill="#00e5ff" opacity="0.2"/>
    <circle cx="1050" cy="140" r="2.5" fill="#1565ff" opacity="0.25"/>
    <circle cx="950" cy="500" r="2"   fill="#00e5ff" opacity="0.2"/>
    <circle cx="820" cy="430" r="2.5" fill="#00e5ff" opacity="0.22"/>

    <!-- Hex nodes at trace ends -->
    <polygon points="350,196 356,200 356,208 350,212 344,208 344,200" fill="none" stroke="#00e5ff" stroke-width="0.8" opacity="0.2"/>
    <polygon points="280,436 286,440 286,448 280,452 274,448 274,440" fill="none" stroke="#1565ff" stroke-width="0.8" opacity="0.18"/>
    <polygon points="1150,216 1156,220 1156,228 1150,232 1144,228 1144,220" fill="none" stroke="#1565ff" stroke-width="0.8" opacity="0.18"/>

    <!-- ── Vertical left accent bar ── -->
    <rect x="0" y="0" width="4" height="630" fill="url(#nameGrad)" opacity="0.5"/>

    <!-- Subtle top border glow -->
    <rect x="0" y="0" width="1200" height="1" fill="#00e5ff" opacity="0.15"/>

    <!-- ── LOGO (right side) ── -->
    <!-- Outer glow circle -->
    <circle cx="940" cy="295" r="130" fill="none" stroke="#00e5ff" stroke-width="0.5" opacity="0.08"/>
    <circle cx="940" cy="295" r="108" fill="none" stroke="#00e5ff" stroke-width="0.5" opacity="0.06"/>
    <circle cx="940" cy="295" r="86"  fill="none" stroke="#1565ff" stroke-width="0.5" opacity="0.06"/>

    <!-- Rotating hex orbit dots -->
    <circle cx="940" cy="167" r="3.5" fill="#00e5ff" opacity="0.35"/>
    <circle cx="1063" cy="224" r="3" fill="#00e5ff" opacity="0.28"/>
    <circle cx="1068" cy="366" r="3.5" fill="#00e5ff" opacity="0.32"/>
    <circle cx="940" cy="423" r="3" fill="#00e5ff" opacity="0.28"/>
    <circle cx="812" cy="366" r="3.5" fill="#00e5ff" opacity="0.3"/>
    <circle cx="817" cy="224" r="3" fill="#00e5ff" opacity="0.28"/>

    <!-- Inner orbit dots -->
    <circle cx="940" cy="189" r="2.5" fill="#1565ff" opacity="0.4"/>
    <circle cx="1047" cy="240" r="2" fill="#1565ff" opacity="0.3"/>
    <circle cx="1047" cy="350" r="2.5" fill="#1565ff" opacity="0.35"/>
    <circle cx="940" cy="401" r="2" fill="#1565ff" opacity="0.3"/>
    <circle cx="833" cy="350" r="2.5" fill="#1565ff" opacity="0.32"/>
    <circle cx="833" cy="240" r="2" fill="#1565ff" opacity="0.3"/>

    <!-- Diamond shape (rotated square) -->
    <polygon points="940,198 1030,295 940,392 850,295"
      fill="url(#diamondFill)"
      stroke="#00e5ff"
      stroke-width="1.5"
      opacity="0.9"
      filter="url(#logoGlow)"/>

    <!-- Nested chevrons inside diamond -->
    <!-- Outer chevron (white) -->
    <polyline points="893,295 917,268 940,295 963,268 987,295"
      fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linejoin="round" opacity="0.85"/>
    <!-- Middle chevron (silver) -->
    <polyline points="900,295 920,275 940,295 960,275 980,295"
      fill="none" stroke="#90a4ae" stroke-width="1.8" stroke-linejoin="round" opacity="0.55"/>
    <!-- Inner chevron (cyan) -->
    <polyline points="912,295 926,281 940,295 954,281 968,295"
      fill="none" stroke="#00e5ff" stroke-width="1.5" stroke-linejoin="round" opacity="0.9"
      filter="url(#cyanGlow)"/>

    <!-- Center node -->
    <circle cx="940" cy="295" r="5" fill="#00e5ff" opacity="0.9" filter="url(#cyanGlow)"/>
    <circle cx="940" cy="295" r="2.5" fill="#ffffff" opacity="0.95"/>

    <!-- Circuit traces from logo -->
    <line x1="1030" y1="295" x2="1090" y2="295" stroke="#00e5ff" stroke-width="0.8" opacity="0.2"/>
    <line x1="850"  y1="295" x2="790"  y2="295" stroke="#00e5ff" stroke-width="0.8" opacity="0.2"/>
    <line x1="940"  y1="198" x2="940"  y2="140" stroke="#00e5ff" stroke-width="0.8" opacity="0.2"/>
    <line x1="940"  y1="392" x2="940"  y2="450" stroke="#1565ff" stroke-width="0.8" opacity="0.2"/>

    <!-- ── LEFT CONTENT ── -->

    <!-- Monospace label -->
    <text x="72" y="148"
      font-family="'JetBrains Mono', 'Courier New', monospace"
      font-size="13"
      fill="#00e5ff"
      letter-spacing="3"
      opacity="0.7">// backend &amp; ai engineer</text>

    <!-- Main name -->
    <text x="70" y="240"
      font-family="'Chakra Petch', 'Trebuchet MS', sans-serif"
      font-size="72"
      font-weight="700"
      fill="url(#nameGrad)"
      letter-spacing="-1">Arjunagi</text>

    <text x="70" y="322"
      font-family="'Chakra Petch', 'Trebuchet MS', sans-serif"
      font-size="72"
      font-weight="700"
      letter-spacing="-1">
      <tspan fill="#ffffff">A.</tspan>
      <tspan fill="transparent" stroke="#00e5ff" stroke-width="1.5" dx="8" filter="url(#cyanGlow)"> Rehman</tspan>
    </text>

    <!-- Divider line -->
    <line x1="70" y1="347" x2="580" y2="347" stroke="#00e5ff" stroke-width="0.8" opacity="0.2"/>

    <!-- Role description -->
    <text x="70" y="390"
      font-family="'Outfit', 'Segoe UI', sans-serif"
      font-size="19"
      fill="#90a4ae"
      letter-spacing="0.3"
      opacity="0.88">Backend · AI Agents · Real-time Systems · Cloud-native</text>

    <!-- Tags row -->
    <!-- Tag: Go -->
    <rect x="70"  y="420" width="48"  height="24" rx="3" fill="rgba(0,229,255,0.06)" stroke="#00e5ff" stroke-width="0.8" opacity="0.7"/>
    <text x="94"  y="436" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#00e5ff" text-anchor="middle" opacity="0.85">Go</text>

    <!-- Tag: Python -->
    <rect x="126" y="420" width="64"  height="24" rx="3" fill="rgba(0,229,255,0.06)" stroke="#00e5ff" stroke-width="0.8" opacity="0.7"/>
    <text x="158" y="436" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#00e5ff" text-anchor="middle" opacity="0.85">Python</text>

    <!-- Tag: AWS -->
    <rect x="198" y="420" width="50"  height="24" rx="3" fill="rgba(21,101,255,0.08)" stroke="#1565ff" stroke-width="0.8" opacity="0.7"/>
    <text x="223" y="436" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#7eb3ff" text-anchor="middle" opacity="0.85">AWS</text>

    <!-- Tag: LangGraph -->
    <rect x="256" y="420" width="84"  height="24" rx="3" fill="rgba(21,101,255,0.08)" stroke="#1565ff" stroke-width="0.8" opacity="0.7"/>
    <text x="298" y="436" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#7eb3ff" text-anchor="middle" opacity="0.85">LangGraph</text>

    <!-- Tag: Google ADK -->
    <rect x="348" y="420" width="96"  height="24" rx="3" fill="rgba(0,229,255,0.06)" stroke="#00e5ff" stroke-width="0.8" opacity="0.7"/>
    <text x="396" y="436" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#00e5ff" text-anchor="middle" opacity="0.85">Google ADK</text>

    <!-- Tag: IoT -->
    <rect x="452" y="420" width="42"  height="24" rx="3" fill="rgba(0,229,255,0.06)" stroke="#00e5ff" stroke-width="0.8" opacity="0.7"/>
    <text x="473" y="436" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" fill="#00e5ff" text-anchor="middle" opacity="0.85">IoT</text>

    <!-- Stats row -->
    <!-- Stat 1 -->
    <text x="70" y="500"
      font-family="'Chakra Petch','Trebuchet MS',sans-serif"
      font-size="28" font-weight="700" fill="#00e5ff" opacity="0.95">2+</text>
    <text x="70" y="520"
      font-family="'JetBrains Mono','Courier New',monospace"
      font-size="10" fill="#90a4ae" letter-spacing="1.5" opacity="0.55">YRS EXP</text>

    <line x1="115" y1="490" x2="115" y2="525" stroke="#00e5ff" stroke-width="0.6" opacity="0.15"/>

    <!-- Stat 2 -->
    <text x="128" y="500"
      font-family="'Chakra Petch','Trebuchet MS',sans-serif"
      font-size="28" font-weight="700" fill="#00e5ff" opacity="0.95">10+</text>
    <text x="128" y="520"
      font-family="'JetBrains Mono','Courier New',monospace"
      font-size="10" fill="#90a4ae" letter-spacing="1.5" opacity="0.55">PRODUCTS</text>

    <line x1="185" y1="490" x2="185" y2="525" stroke="#00e5ff" stroke-width="0.6" opacity="0.15"/>

    <!-- Stat 3 -->
    <text x="198" y="500"
      font-family="'Chakra Petch','Trebuchet MS',sans-serif"
      font-size="28" font-weight="700" fill="#7eb3ff" opacity="0.95">0→1</text>
    <text x="198" y="520"
      font-family="'JetBrains Mono','Courier New',monospace"
      font-size="10" fill="#90a4ae" letter-spacing="1.5" opacity="0.55">MINDSET</text>

    <line x1="262" y1="490" x2="262" y2="525" stroke="#00e5ff" stroke-width="0.6" opacity="0.15"/>

    <!-- Stat 4 -->
    <text x="275" y="500"
      font-family="'Chakra Petch','Trebuchet MS',sans-serif"
      font-size="28" font-weight="700" fill="#7eb3ff" opacity="0.95">BIAL</text>
    <text x="275" y="520"
      font-family="'JetBrains Mono','Courier New',monospace"
      font-size="10" fill="#90a4ae" letter-spacing="1.5" opacity="0.55">CLIENT</text>

    <!-- Bottom URL -->
    <text x="70" y="582"
      font-family="'JetBrains Mono','Courier New',monospace"
      font-size="13"
      fill="#00e5ff"
      letter-spacing="1.5"
      opacity="0.5">arjunagiarehman.com</text>

    <!-- Pulsing location dot -->
    <circle cx="58" cy="578" r="4" fill="#00e5ff" opacity="0.6"/>
    <circle cx="58" cy="578" r="7" fill="none" stroke="#00e5ff" stroke-width="0.8" opacity="0.25"/>

    <!-- Bottom right: Bangalore badge -->
    <text x="1130" y="590"
      font-family="'JetBrains Mono','Courier New',monospace"
      font-size="11"
      fill="#90a4ae"
      text-anchor="end"
      opacity="0.4">Bangalore, India</text>

    <!-- Bottom border glow -->
    <rect x="0" y="629" width="1200" height="1" fill="#00e5ff" opacity="0.1"/>

  </g>
</svg>
