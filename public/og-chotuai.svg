<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#040912"/>
      <stop offset="100%" stop-color="#050a14"/>
    </linearGradient>
    <radialGradient id="glow1" cx="70%" cy="40%" r="42%">
      <stop offset="0%" stop-color="#1565ff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#1565ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="65%" r="30%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#e8f4ff"/>
      <stop offset="100%" stop-color="#7eb3ff"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <rect x="0" y="0" width="4" height="630" fill="#00e5ff" opacity="0.5"/>
  <rect x="0" y="0" width="1200" height="1" fill="#1565ff" opacity="0.12"/>

  <!-- Circuit traces -->
  <line x1="0" y1="90"  x2="450" y2="90"  stroke="#1565ff" stroke-width="0.6" opacity="0.09"/>
  <line x1="0" y1="180" x2="380" y2="180" stroke="#00e5ff" stroke-width="0.6" opacity="0.07"/>
  <line x1="0" y1="450" x2="400" y2="450" stroke="#1565ff" stroke-width="0.6" opacity="0.08"/>
  <line x1="0" y1="540" x2="460" y2="540" stroke="#00e5ff" stroke-width="0.6" opacity="0.06"/>
  <line x1="780" y1="80"  x2="1200" y2="80"  stroke="#00e5ff" stroke-width="0.6" opacity="0.07"/>
  <line x1="800" y1="200" x2="1200" y2="200" stroke="#1565ff" stroke-width="0.6" opacity="0.06"/>
  <line x1="760" y1="400" x2="1200" y2="400" stroke="#00e5ff" stroke-width="0.6" opacity="0.07"/>
  <polyline points="0,130 190,130 190,210 330,210" fill="none" stroke="#1565ff" stroke-width="0.7" opacity="0.09"/>
  <polyline points="900,0 900,120 1000,120 1000,210" fill="none" stroke="#00e5ff" stroke-width="0.7" opacity="0.08"/>

  <!-- Agent orbit diagram (right side) -->
  <!-- Outer orbit ring -->
  <circle cx="940" cy="295" r="150" fill="none" stroke="#1565ff" stroke-width="0.6" opacity="0.1" stroke-dasharray="6,4"/>
  <circle cx="940" cy="295" r="110" fill="none" stroke="#00e5ff" stroke-width="0.6" opacity="0.08" stroke-dasharray="4,4"/>

  <!-- Center supervisor node -->
  <circle cx="940" cy="295" r="44" fill="rgba(0,229,255,0.07)" stroke="#00e5ff" stroke-width="1.5" opacity="0.7" filter="url(#glow)"/>
  <circle cx="940" cy="295" r="28" fill="rgba(0,229,255,0.1)" opacity="0.5"/>
  <text x="940" y="291" font-family="'Chakra Petch',sans-serif" font-size="9" fill="#00e5ff" text-anchor="middle" opacity="0.9" font-weight="700">SUPER</text>
  <text x="940" y="303" font-family="'Chakra Petch',sans-serif" font-size="9" fill="#00e5ff" text-anchor="middle" opacity="0.9" font-weight="700">VISOR</text>

  <!-- Sub-agent nodes (4 around orbit) -->
  <!-- Tasks - top -->
  <circle cx="940" cy="145" r="28" fill="rgba(21,101,255,0.1)" stroke="#1565ff" stroke-width="1.2" opacity="0.7"/>
  <text x="940" y="149" font-family="'JetBrains Mono',monospace" font-size="9" fill="#7eb3ff" text-anchor="middle" opacity="0.85">Tasks</text>
  <line x1="940" y1="185" x2="940" y2="251" stroke="#1565ff" stroke-width="0.8" opacity="0.3" stroke-dasharray="3,3"/>

  <!-- Calendar - right -->
  <circle cx="1090" cy="295" r="28" fill="rgba(21,101,255,0.1)" stroke="#1565ff" stroke-width="1.2" opacity="0.7"/>
  <text x="1090" y="291" font-family="'JetBrains Mono',monospace" font-size="9" fill="#7eb3ff" text-anchor="middle" opacity="0.85">Cal-</text>
  <text x="1090" y="303" font-family="'JetBrains Mono',monospace" font-size="9" fill="#7eb3ff" text-anchor="middle" opacity="0.85">endar</text>
  <line x1="1062" y1="295" x2="984" y2="295" stroke="#1565ff" stroke-width="0.8" opacity="0.3" stroke-dasharray="3,3"/>

  <!-- Planner - bottom -->
  <circle cx="940" cy="445" r="28" fill="rgba(0,229,255,0.06)" stroke="#00e5ff" stroke-width="1.2" opacity="0.7"/>
  <text x="940" y="449" font-family="'JetBrains Mono',monospace" font-size="9" fill="#00e5ff" text-anchor="middle" opacity="0.85">Planner</text>
  <line x1="940" y1="405" x2="940" y2="339" stroke="#00e5ff" stroke-width="0.8" opacity="0.3" stroke-dasharray="3,3"/>

  <!-- Memory - left -->
  <circle cx="790" cy="295" r="28" fill="rgba(0,229,255,0.06)" stroke="#00e5ff" stroke-width="1.2" opacity="0.7"/>
  <text x="790" y="299" font-family="'JetBrains Mono',monospace" font-size="9" fill="#00e5ff" text-anchor="middle" opacity="0.85">Memory</text>
  <line x1="818" y1="295" x2="896" y2="295" stroke="#00e5ff" stroke-width="0.8" opacity="0.3" stroke-dasharray="3,3"/>

  <!-- Model labels -->
  <text x="940" y="126" font-family="'JetBrains Mono',monospace" font-size="8" fill="#90a4ae" text-anchor="middle" opacity="0.5">DeepSeek V3</text>
  <text x="1118" y="285" font-family="'JetBrains Mono',monospace" font-size="8" fill="#90a4ae" text-anchor="start" opacity="0.5">DeepSeek</text>
  <text x="940" y="488" font-family="'JetBrains Mono',monospace" font-size="8" fill="#90a4ae" text-anchor="middle" opacity="0.5">DeepSeek V3</text>
  <text x="762" y="285" font-family="'JetBrains Mono',monospace" font-size="8" fill="#90a4ae" text-anchor="end" opacity="0.5">GPT-4o-mini</text>

  <!-- Left content -->
  <text x="70" y="148" font-family="'JetBrains Mono','Courier New',monospace" font-size="13" fill="#00e5ff" letter-spacing="3" opacity="0.65">// multi-agent personal assistant</text>

  <text x="70" y="248" font-family="'Chakra Petch','Trebuchet MS',sans-serif" font-size="80" font-weight="700" fill="url(#titleGrad)" letter-spacing="-1">Chot</text>
  <text x="70" y="330" font-family="'Chakra Petch','Trebuchet MS',sans-serif" font-size="80" font-weight="700" letter-spacing="-1">
    <tspan fill="#00e5ff">U</tspan><tspan fill="rgba(255,255,255,0.2)">.</tspan><tspan fill="transparent" stroke="#1565ff" stroke-width="1.5">AI</tspan>
  </text>

  <line x1="70" y1="352" x2="540" y2="352" stroke="#00e5ff" stroke-width="0.8" opacity="0.18"/>

  <text x="70" y="393" font-family="'Outfit','Segoe UI',sans-serif" font-size="18" fill="#90a4ae" opacity="0.85">5 AI agents · LangGraph + OpenRouter · AWS ECS Fargate</text>

  <!-- Tags -->
  <rect x="70"  y="422" width="84"  height="22" rx="3" fill="rgba(0,229,255,0.06)" stroke="#00e5ff" stroke-width="0.8" opacity="0.7"/>
  <text x="112" y="437" font-family="'JetBrains Mono',monospace" font-size="10" fill="#00e5ff" text-anchor="middle" opacity="0.85">LangGraph</text>
  <rect x="162" y="422" width="86"  height="22" rx="3" fill="rgba(21,101,255,0.08)" stroke="#1565ff" stroke-width="0.8" opacity="0.7"/>
  <text x="205" y="437" font-family="'JetBrains Mono',monospace" font-size="10" fill="#7eb3ff" text-anchor="middle" opacity="0.85">OpenRouter</text>
  <rect x="256" y="422" width="92"  height="22" rx="3" fill="rgba(21,101,255,0.08)" stroke="#1565ff" stroke-width="0.8" opacity="0.7"/>
  <text x="302" y="437" font-family="'JetBrains Mono',monospace" font-size="10" fill="#7eb3ff" text-anchor="middle" opacity="0.85">ECS Fargate</text>
  <rect x="356" y="422" width="60"  height="22" rx="3" fill="rgba(0,229,255,0.06)" stroke="#00e5ff" stroke-width="0.8" opacity="0.7"/>
  <text x="386" y="437" font-family="'JetBrains Mono',monospace" font-size="10" fill="#00e5ff" text-anchor="middle" opacity="0.85">AWS CDK</text>

  <!-- Stats -->
  <text x="70"  y="495" font-family="'Chakra Petch',sans-serif" font-size="26" font-weight="700" fill="#00e5ff" opacity="0.95">5</text>
  <text x="70"  y="513" font-family="'JetBrains Mono',monospace" font-size="10" fill="#90a4ae" letter-spacing="1.5" opacity="0.5">AGENTS</text>
  <line x1="102" y1="482" x2="102" y2="517" stroke="#1565ff" stroke-width="0.6" opacity="0.15"/>
  <text x="115" y="495" font-family="'Chakra Petch',sans-serif" font-size="26" font-weight="700" fill="#7eb3ff" opacity="0.95">3</text>
  <text x="115" y="513" font-family="'JetBrains Mono',monospace" font-size="10" fill="#90a4ae" letter-spacing="1.5" opacity="0.5">LLM MODELS</text>
  <line x1="175" y1="482" x2="175" y2="517" stroke="#1565ff" stroke-width="0.6" opacity="0.15"/>
  <text x="188" y="495" font-family="'Chakra Petch',sans-serif" font-size="26" font-weight="700" fill="#7eb3ff" opacity="0.95">CDK</text>
  <text x="188" y="513" font-family="'JetBrains Mono',monospace" font-size="10" fill="#90a4ae" letter-spacing="1.5" opacity="0.5">FULL IAC</text>

  <circle cx="58" cy="578" r="4" fill="#00e5ff" opacity="0.6"/>
  <circle cx="58" cy="578" r="7" fill="none" stroke="#1565ff" stroke-width="0.8" opacity="0.25"/>
  <text x="70" y="582" font-family="'JetBrains Mono',monospace" font-size="13" fill="#00e5ff" letter-spacing="1.5" opacity="0.48">arjunagiarehman.com/projects/chotuai</text>
  <text x="1130" y="590" font-family="'JetBrains Mono',monospace" font-size="11" fill="#90a4ae" text-anchor="end" opacity="0.38">Arjunagi A. Rehman</text>
  <rect x="0" y="629" width="1200" height="1" fill="#1565ff" opacity="0.12"/>
</svg>
